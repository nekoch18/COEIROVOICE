<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            background: #1f1f1f;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* タイトルバーのデザイン（メイン画面と統一） */
        .title-bar {
            display: flex;
            align-items: center;
            height: 38px;
            padding: 0 12px;
            background: #1f1f1f;
            -webkit-app-region: drag;
        }

        .close-btn {
            width: 45px;
            height: 38px;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            -webkit-app-region: no-drag;
            font-size: 18px;
            margin-left: auto;
        }

        .close-btn:hover {
            background: #e81123;
            color: #fff;
        }

        /* macOSっぽい close（左の信号ボタン） */
        .platform-darwin .close-btn {
            width: 12px;
            height: 12px;
            border-radius: 999px;
            background: #ff5f57;
            padding: 0;
            font-size: 0;
            margin-left: 0;
        }

        .platform-darwin .close-btn::before {
            content: "×";
            display: inline-block;
            width: 12px;
            height: 12px;
            text-align: center;
            font-size: 10px;
            line-height: 12px;
            color: rgba(0, 0, 0, 0.65);
            opacity: 0;
            transition: opacity 0.12s ease-in-out;
        }

        .platform-darwin .title-bar:hover .close-btn::before {
            opacity: 1;
        }

        .platform-darwin .close-btn:hover {
            background: #ff5f57;
            color: transparent;
        }

        /* コンテンツエリア */
        .about-content {
            text-align: center;
            padding: 30px 20px;
        }
    </style>
</head>

<body>
    <div class="title-bar">
        <button id="closeAboutBtn" class="close-btn">×</button>
    </div>

    <div class="about-content">
        <h2 style="color:#10b981; margin:0;">COEIROVOICE</h2>
        <img src="./img/corirovoice-logo.png" alt="COEIROVOICE Logo" style="width:100px; margin-top:20px;">
        <p style="font-size:12px; color:#888;">Version <span id="version"></span></p>
        <p style="padding:15px; font-size:14px;">使用API：COEIROINK</p>
        <hr style="width:100px; border:0; border-top:1px solid #333; margin: 20px auto;">
        <p style="font-size:11px; color:#666;">© 2026 COEIROVOICE Project</p>
    </div>

    <script src="about.js"></script>
    <script>
        (async () => {
            try {
                document.body.classList.add(`platform-${window.api?.platform ?? "unknown"}`);
            } catch { }
            try {
                const version = await window.api?.getVersion?.();
                document.getElementById("version").textContent = version ?? "unknown";
            } catch {
                document.getElementById("version").textContent = "unknown";
            }
        })();
    </script>
</body>

</html>
